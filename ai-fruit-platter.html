    <script>
        const loadingMessages = [
            "🔍 Researching health benefits...",
            "📊 Analyzing your health conditions...",
            "🥗 Creating personalized fruit mix...",
            "💰 Calculating pricing...",
            "✅ Evaluating recommendation quality...",
            "⏳ Almost ready with your results...",
            "🎯 Finalizing your platter..."
        ];

        let currentMessageIndex = 0;

        function rotateLoadingMessages() {
            const messagesEl = document.getElementById('loadingMessages');
            const pEl = messagesEl.querySelector('p');

            currentMessageIndex = (currentMessageIndex + 1) % loadingMessages.length;
            pEl.textContent = loadingMessages[currentMessageIndex];
        }

        const form = document.getElementById('userForm');
        const formSection = document.getElementById('formSection');
        const resultsSection = document.getElementById('resultsSection');
        const resultsContent = document.getElementById('resultsContent');
        const submitBtn = document.getElementById('submitBtn');
        const loaderOverlay = document.getElementById('loaderOverlay');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            await handleFormSubmit();
        });

        async function handleFormSubmit() {
            const formData = new FormData(form);
            const userData = {
                name: formData.get('name'),
                age: parseInt(formData.get('age')),
                gender: formData.get('gender'),
                weight: formData.get('weight'),
                height: formData.get('height'),
                goal: formData.get('goal'),
                activity_level: formData.get('activityLevel'),
                diet_preference: formData.get('dietPreference'),
                health_conditions: formData.get('healthConditions').split(',').map(f => f.trim()).filter(f => f),
                favorite_fruits: formData.get('favoriteFruits').split(',').map(f => f.trim()).filter(f => f),
                avoid_fruits: formData.get('avoidFruits').split(',').map(f => f.trim()).filter(f => f),
                region: formData.get('region')
            };

            submitBtn.disabled = true;
            document.getElementById('btnText').innerHTML = '<span class="spinner"></span>Processing...';

            // Show results section with loader
            resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
            loaderOverlay.classList.add('active');
            resultsContent.innerHTML = '';
            currentMessageIndex = 0;

            // Rotate messages every 2 seconds
            const messageInterval = setInterval(rotateLoadingMessages, 2500);

            try {
                const response = await fetch('https://your-backend-api.com/api/get-recommendation/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': getCSRFToken()
                    },
                    body: JSON.stringify(userData)
                });

                clearInterval(messageInterval);
                const result = await response.json();

                if (response.ok) {
                    loaderOverlay.classList.remove('active');
                    displayResults(result);
                } else {
                    loaderOverlay.classList.remove('active');
                    showError(result.error || 'Failed to get recommendation');
                }
            } catch (error) {
                clearInterval(messageInterval);
                loaderOverlay.classList.remove('active');
                showError('Error: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                document.getElementById('btnText').innerHTML = 'Get Personalized Recommendation';
            }
        }

        function displayResults(data) {
            let html = '';

            // User Profile
            if (data.user_profile) {
                html += `
                    <div class="success-box">
                        ✓ Recommendation generated for ${data.user_profile.name}
                    </div>
                `;
            }

            // Main Recommendation
            if (data.recommendation && !data.recommendation.error) {
                const rec = data.recommendation;
                html += `
                    <div class="recommendation-box">
                        <div class="platter-name">🍽️ ${rec.platter_name || 'Your Custom Fruit Platter'}</div>

                        <div class="result-card">
                            <h3>Goal Alignment</h3>
                            <p>${rec.goal_alignment_summary || 'Platter aligned with your goals'}</p>
                        </div>

                        <div class="result-card">
                            <h3>Recommended Mix</h3>
                            <div class="fruit-list">
                                ${rec.recommended_mix ? rec.recommended_mix.map(fruit => `<div class="fruit-item">🥝 ${fruit}</div>`).join('') : '<p>No fruits recommended</p>'}
                            </div>
                        </div>

                        <div class="result-card">
                            <h3>Quantities & Timing</h3>
                            ${rec.quantity_per_fruit_gm ? `
                                <table>
                                    <tr>
                                        <th>Fruit</th>
                                        <th>Quantity (g)</th>
                                    </tr>
                                    ${Object.entries(rec.quantity_per_fruit_gm).map(([fruit, qty]) => `
                                        <tr>
                                            <td>${fruit}</td>
                                            <td><strong>${qty}g</strong></td>
                                        </tr>
                                    `).join('')}
                                    <tr style="background: #f0f4ff; font-weight: bold;">
                                        <td>Total Weight</td>
                                        <td>${rec.total_quantity_gm || 0}g</td>
                                    </tr>
                                </table>
                            ` : '<p>No quantity data</p>'}
                            ${rec.suggested_time_to_eat ? `<p style="margin-top: 15px;"><strong>Best Time:</strong> ${rec.suggested_time_to_eat}</p>` : ''}
                        </div>

                        <div class="result-card">
                            <h3>Nutritional Benefits</h3>
                            <p>${rec.nutritional_benefits || 'Balanced nutritional profile'}</p>
                        </div>
                    </div>
                `;

                // Health Research
                if (data.health_research && !data.health_research.error) {
                    html += `
                        <div class="result-card">
                            <h3>📊 Health Research Insights</h3>
                            <p><strong>Summary:</strong> ${data.health_research.summary || 'Research data gathered'}</p>
                            ${data.health_research.sources ? `<p style="font-size: 0.9em; color: #999;">Sources: ${data.health_research.sources.slice(0, 2).join(', ')}</p>` : ''}
                        </div>
                    `;
                }

                // Pricing Information
                if (rec.pricing && rec.pricing.total_platter_cost !== undefined) {
                    html += `
                        <div class="result-card">
                            <h3>💰 Pricing Breakdown</h3>
                            <div class="pricing-info">
                                ${Object.entries(rec.pricing.fruit_wise_cost || {}).map(([fruit, details]) => `
                                    <div class="pricing-item">
                                        <span>${fruit}: ${details.quantity_gm}g</span>
                                        <span>~₹${details.total_cost}</span>
                                    </div>
                                `).join('')}
                                <div class="pricing-item">
                                    <span>Total Platter Cost</span>
                                    <span>~₹${rec.pricing.total_platter_cost}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }
            }

            // Fruit Benefits
            if (data.fruit_benefits && !data.fruit_benefits.error) {
                html += `
                    <div class="result-card">
                        <h3>🌟 Fruit Benefits Research</h3>
                        <p>${data.fruit_benefits.summary || 'Benefits research completed'}</p>
                    </div>
                `;
            }

            resultsContent.innerHTML = html;
        }

        function showError(message) {
            resultsContent.innerHTML = `
                <div class="error-box">
                    ❌ ${message}
                </div>
            `;
        }

        function getCSRFToken() {
            const name = 'csrftoken';
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
</body>
</html>
